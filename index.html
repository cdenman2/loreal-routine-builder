<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>L’Oréal Product-Aware Routine Builder</title>
<link rel="stylesheet" href="./styles.css" />
</head>

<body>
<div class="page">

<header class="header">
  <div class="logo-wrap top-logo-wrap">
    <img src="./images/loreal-logo.jpg" class="logo">
  </div>

  <p class="motto">"Because We’re Worth It"</p>
  <h1 class="title">L’Oréal Product-Aware Routine Builder</h1>
  <p class="subtitle">Build a personalized routine with AI-powered guidance</p>

  <div class="fact-box">
    <p>Healthy skincare routines: cleanser → serum → moisturizer → SPF</p>
  </div>
</header>

<section class="controls-section">
  <div class="toolbar">
    <input id="search-input" placeholder="Search products...">
    <select id="category-filter">
      <option value="all">All Categories</option>
      <option value="skincare">Skincare</option>
      <option value="haircare">Haircare</option>
      <option value="makeup">Makeup</option>
      <option value="other">Other</option>
    </select>
  </div>

  <div class="products-top-actions">
    <button id="load-products-btn">Load Live L’Oréal Products</button>
    <button id="show-more-btn">Show More</button>
  </div>

  <div id="product-status">Click to load products</div>
  <div id="product-grid" class="product-grid"></div>
</section>

<section class="selected-section">
  <h2>Selected Products</h2>
  <div id="selected-products-list"></div>
</section>

<main class="chat-container">
  <div id="chat-box"></div>

  <div class="input-area">
    <input id="user-input" placeholder="Ask something...">
    <button id="send-btn">Send</button>
  </div>
</main>

<script src="./script.js"></script>
</body>
</html>
