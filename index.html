<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>L'Oréal Routine Builder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <img src="https://1000logos.net/wp-content/uploads/2017/05/Loreal-logo.png" class="logo">
    <div class="tagline">"Because You're Worth It"</div>
  </div>

  <h1>L’Oréal Product-Aware Routine Builder</h1>

  <!-- CONTROLS -->
  <div class="controls">
    <input id="searchInput" placeholder="Search products...">

    <select id="categoryDropdown">
      <option value="all">All Categories</option>
      <option value="skincare">Skincare</option>
      <option value="haircare">Haircare</option>
      <option value="makeup">Makeup</option>
      <option value="other">Other</option>
    </select>

    <div class="button-row">
      <button onclick="loadProducts()">Load Live L'Oréal Products</button>
      <button onclick="showMoreProducts()">Show More Products</button>
    </div>

    <div id="productCount"></div>
  </div>

  <!-- PRODUCTS -->
  <div id="productContainer" class="product-grid"></div>

  <!-- SELECTED -->
  <div class="selected-box">
    <h2>Selected Products</h2>
    <div id="selectedProducts">No products selected yet.</div>

    <button onclick="generateRoutine()">Generate Routine</button>
    <button onclick="clearSelected()">Clear Selected Products</button>
  </div>

  <!-- CHAT -->
  <div class="chatbox">
    <div id="chatMessages"></div>

    <input id="chatInput" placeholder="Ask about your routine...">
    <button onclick="sendMessage()">Send</button>
  </div>

<script src="script.js"></script>
</body>
</html>
