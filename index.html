<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>L'Oréal Routine Builder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>L’Oréal Product-Aware Routine Builder</h1>

  <!-- CONTROLS -->
  <div class="controls">
    <input id="search" placeholder="Search products..." />
    
    <select id="category">
      <option value="all">All Categories</option>
      <option value="skincare">Skincare</option>
      <option value="haircare">Haircare</option>
      <option value="makeup">Makeup</option>
      <option value="other">Other</option>
    </select>

    <div class="buttons">
      <button onclick="loadProducts()">Load Products</button>
      <button onclick="showMore()">Show More</button>
    </div>

    <div id="count"></div>
  </div>

  <!-- PRODUCTS -->
  <div id="products" class="grid"></div>

  <!-- SELECTED -->
  <div class="selected">
    <h2>Selected Products</h2>
    <div id="selectedList">None selected</div>

    <button onclick="generateRoutine()">Generate Routine</button>
    <button onclick="clearSelected()">Clear</button>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div id="chatBox"></div>

    <input id="chatInput" placeholder="Ask about your routine..." />
    <button onclick="sendChat()">Send</button>
  </div>

<script src="script.js"></script>
</body>
</html>
