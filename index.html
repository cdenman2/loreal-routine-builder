<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L’Oréal Product-Aware Routine Builder</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="logo-wrap top-logo-wrap">
        <img src="./images/loreal-logo.jpg" alt="L’Oréal Logo" class="logo top-logo" />
      </div>

      <p class="motto">"Because We’re Worth It"</p>
      <h1 class="title">L’Oréal Product-Aware Routine Builder</h1>
      <p class="subtitle">Build a personalized routine with product selection and AI-powered guidance</p>

      <div class="fact-box">
        <p id="fact-text"></p>
      </div>
    </header>

    <section class="controls-section">
      <div class="toolbar">
        <input type="text" id="search-input" placeholder="Search products..." />
        <select id="category-filter">
          <option value="all">All Categories</option>
          <option value="skincare">Skincare</option>
          <option value="haircare">Haircare</option>
          <option value="makeup">Makeup</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="products-top-actions">
        <button id="load-products-btn">Load Products</button>
      </div>

      <div id="product-status"></div>
      <div id="product-grid" class="product-grid"></div>

      <div class="product-nav">
        <button id="products-prev-btn">⬅</button>
        <button id="products-next-btn">➡</button>
      </div>
    </section>

    <section class="selected-section">
      <h2>Selected Products</h2>
      <div id="selected-products-empty">No products selected</div>
      <div id="selected-products-list"></div>

      <div class="selected-actions">
        <button id="generate-routine-btn">Generate Routine</button>
        <button id="clear-products-btn">Clear</button>
      </div>
    </section>

    <!-- CHAT -->
    <main class="chat-container" id="chat-container">
      <div class="chat-header">
        <span>Chatbot</span>
        <button id="expand-chat-btn">⬜</button>
      </div>

      <div id="chat-box" class="chat-box"></div>

      <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask something..." />
        <button id="send-btn">Send</button>
        <button id="clear-chat-btn">Clear</button>
      </div>
    </main>

    <footer class="footer">
      <p>© 2026 L’Oréal-inspired student project</p>
    </footer>
  </div>

  <script src="./script.js"></script>
</body>
</html>
